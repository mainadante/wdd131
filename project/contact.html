<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Maina Dante">
    <meta name="description"
        content="Contact Global Travel Explorer with questions, travel interests, or destination recommendations using our easy-to-use contact form.">
    <title>Contact</title>
    <link rel="stylesheet" href="styles/main.css">
    <script src="scripts/main.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light&display=swap">
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light&display=swap" media="print"
        onload="this.media='all'">
</head>

<body>

    <header>
        <div class="logo-container">
            <img src="images/logo.webp" alt="Global Travel Explorer Logo" class="logo">
            <h1>Global Travel Explorer</h1>
        </div>
    
        <button id="menuBtn" aria-label="Open Menu">
            ☰
        </button>
    
        <nav id="navMenu">
            <a href="index.html">Home</a>
            <a href="destinations.html">Destinations</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main>

        <h2>Contact Us</h2>

        <form class="contact-form">
            <label for="name">Name*</label>
            <input type="text" id="name" required>

            <label for="email">Email*</label>
            <input type="email" id="email" required>

            <label for="destination">Destination Interest</label>
            <select id="destination">
                <option value="" disabled selected>Select a Destination...</option>
                <option>Paris</option>
                <option>Rio de Janeiro</option>
                <option>Tokyo</option>
            </select>

            <label for="message">Message</label>
            <textarea id="message"></textarea>

            <button type="submit">Send Message</button>
        </form>

    </main>

    <footer>
        <p>&copy;<span id="currentyear"></span> Maina Dante | Brazil</p>
        <p id="lastModified"></p>
        <a href="references.html">References</a>
    </footer>

</body>

</html>
